interface:
  customWelcome: "Welcome to LibreChat by Buzz! Enjoy your experience."
  modelSelect: false
  parameters: false
  presets: false
  prompts:
    use: false
    create: false
  bookmarks: false
  agents:
    use: true
    create: false
  peoplePicker:
    users: false
    groups: false
    roles: false
  remoteAgents:
    use: true
  mcpServers:
    use: true
    create: false
    share: false

registration:
  socialLogins: ["google"]
  allowedDomains:
    - "buzzbrothers.ch"

balance:
  enabled: true

transactions:
  enabled: true

actions:
  allowedDomains:
    - "swapi.dev"
    - "librechat.ai"
    - "google.com"
    - "*"

mcpSettings:
  allowedDomains:
    - "buzzbrothers.ch"
    - "*"
    - "host.docker.internal" # Docker host access (required for Docker setups)
    - "localhost" # Local development
    - "127.0.0.1" # Local development
    - "127.0.0.1:3845" # Local development

endpoints:
  azureOpenAI:
    assistants: true
    plugins: true
    titleConvo: true
    titleModel: "current_model"
    groups:
      - group: "JTI Azure"
        apiKey: "${BB_AZURE_API_KEY}"
        instanceName: "buzzgpt-swiss"
        # baseURL: "https://buzzgpt-swiss.openai.azure.com/"
        # Mark this group as assistants compatible
        assistants: true
        # version must be "2024-02-15-preview" or later
        models:
          jti-azure-gpt-4-1:
            deploymentName: "gpt-4.1"
            version: "2024-12-01-preview"
            webSearch: true
          jti-azure-gpt-5-2:
            deploymentName: "gpt-5.2"
            version: "2024-05-01-preview"
            webSearch: true
          jti-azure-gpt-5-2-chat:
            deploymentName: "gpt-5.2-chat"
            version: "2024-05-01-preview"
            webSearch: true
          jti-azure-gpt-5-pro:
            deploymentName: "gpt-5-pro"
            version: "2024-05-01-preview"
            webSearch: true
          jti-azure-o3:
            deploymentName: "o3"
            version: "2024-05-01-preview"
            webSearch: true

